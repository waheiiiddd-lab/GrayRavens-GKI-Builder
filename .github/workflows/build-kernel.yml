name: Build kernel
on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant (ALL = KWS + KSUN + VNL)'
        type: choice
        options:
          - KWS
          - KSUN
          - VNL
          - ALL
        default: KWS
      clang_variant:
        description: 'Clang toolchain (ALL = NEUTRON-19 + YUKI-18 + CLANG-12)'
        type: choice
        options:
          - NEUTRON-19
          - YUKI-18
          - CLANG-12
          - ALL
        default: NEUTRON-19
      kernel_name:
        description: 'Kernel base name'
        type: string
        default: GrayRavens-Zenithed-V6.0
      kernel_ref:
        description: 'kernel branch / tag / SHA to build'
        type: string
        default: android12-5.10

jobs:
  # ── Resolve matrix from inputs ─────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      ksu_variants: ${{ steps.resolve.outputs.ksu_variants }}
      clang_variants: ${{ steps.resolve.outputs.clang_variants }}
    steps:
      - name: Resolve variants
        id: resolve
        run: |
          if [ "${{ inputs.ksu_variant }}" = "ALL" ]; then
            echo 'ksu_variants=["KWS","KSUN","VNL"]' >> $GITHUB_OUTPUT
          else
            echo 'ksu_variants=["${{ inputs.ksu_variant }}"]' >> $GITHUB_OUTPUT
          fi

          if [ "${{ inputs.clang_variant }}" = "ALL" ]; then
            echo 'clang_variants=["NEUTRON-19","YUKI-18","CLANG-12"]' >> $GITHUB_OUTPUT
          else
            echo 'clang_variants=["${{ inputs.clang_variant }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ksu: ${{ fromJson(needs.setup.outputs.ksu_variants) }}
        clang: ${{ fromJson(needs.setup.outputs.clang_variants) }}

    steps:
      - name: Checkout workflow repo (build.sh lives here)
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            bc bison flex build-essential libssl-dev libelf-dev \
            cpio kmod rsync zip patch curl ca-certificates \
            python3 python3-pip python3-lxml git wget binutils

      # ── Neutron 19 ────────────────────────────────────────────────────────
      - name: Download Neutron Clang 19
        if: matrix.clang == 'NEUTRON-19'
        run: |
          mkdir -p ~/toolchain/neutron-clang
          cd ~/toolchain/neutron-clang
          curl -LO "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman"
          chmod +x antman
          ./antman -S=10032024
          ./antman --patch=glibc
          echo "Neutron Clang 19 ready."

      - name: Verify Neutron Clang optimizations
        if: matrix.clang == 'NEUTRON-19'
        run: |
          echo "=== Clang binary BOLT check ==="
          readelf -S ~/toolchain/neutron-clang/bin/clang \
            | grep -i "bolt\|llvm_bb" || echo "No BOLT sections found"
          echo "=== Clang build comment ==="
          readelf -p .comment ~/toolchain/neutron-clang/bin/clang 2>/dev/null \
            | head -20 || echo "No .comment section"
          echo "=== PGO check ==="
          strings ~/toolchain/neutron-clang/bin/clang \
            | grep -i "profdata\|pgo\|instrumented" | head -10 \
            || echo "No PGO strings found"

      # ── Yuki Clang 18 ─────────────────────────────────────────────────────
      - name: Cache Yuki Clang 19
        if: matrix.clang == 'YUKI-18'
        id: cache-yuki-18
        uses: actions/cache@v4
        with:
          path: ~/toolchain/yuki-clang-19
          key: yuki-clang-19.0.0-x86_64

      - name: Download Yuki Clang 19 (if not cached)
        if: matrix.clang == 'YUKI-18' && steps.cache-yuki-18.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b 19.0.0git \
            https://bitbucket.org/thexperienceproject/yuki-clang.git \
            ~/toolchain/yuki-clang-19
          echo "Yuki Clang 19.0.0git ready."

      # ── AOSP Clang r416183b (LLVM 12.0.5) ────────────────────────────────
      - name: Cache AOSP Clang r416183b
        if: matrix.clang == 'CLANG-12'
        id: cache-aosp-12
        uses: actions/cache@v4
        with:
          path: ~/toolchain/aosp-clang-r416183b
          key: aosp-clang-r416183b-x86_64

      - name: Download AOSP Clang r416183b (if not cached)
        if: matrix.clang == 'CLANG-12' && steps.cache-aosp-12.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git \
            ~/toolchain/aosp-clang-r416183b
          echo "AOSP Clang r416183b (LLVM 12.0.5) ready."

      # ── Export CLANG_PATH ─────────────────────────────────────────────────
      - name: Export CLANG_PATH
        run: |
          case "${{ matrix.clang }}" in
            NEUTRON-19) echo "CLANG_PATH=$HOME/toolchain/neutron-clang" >> $GITHUB_ENV ;;
            YUKI-18)    echo "CLANG_PATH=$HOME/toolchain/yuki-clang-19" >> $GITHUB_ENV ;;
            CLANG-12)   echo "CLANG_PATH=$HOME/toolchain/aosp-clang-r416183b" >> $GITHUB_ENV ;;
          esac

      # ── Kernel source ─────────────────────────────────────────────────────
      - name: Shallow-clone kernel source
        run: |
          git clone --depth=1 --branch "${{ inputs.kernel_ref }}" \
            https://github.com/XTENSEI/kernel_common_5.10 kernel

      # ── KSU setup ─────────────────────────────────────────────────────────
      - name: Apply KernelSU (${{ matrix.ksu }})
        if: matrix.ksu != 'VNL'
        working-directory: kernel
        run: |
          if [ "${{ matrix.ksu }}" = "KWS" ]; then
            curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/main/kernel/setup.sh" | bash -s master
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=n\n' \
              >> arch/arm64/configs/gki_defconfig
          else
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs
            printf '\nCONFIG_KSU=y\nCONFIG_KSU_MANUAL_SU=n\nCONFIG_KSU_SUSFS=y\n' \
              >> arch/arm64/configs/gki_defconfig
          fi

      - name: Verify KSU integration (${{ matrix.ksu }})
        if: matrix.ksu != 'VNL'
        working-directory: kernel
        run: |
          echo "=== KSU directory check ==="
          ls -la KernelSU* 2>/dev/null || echo "WARNING: No KernelSU dir found!"
          echo "=== drivers/kernelsu check ==="
          ls drivers/kernelsu/ 2>/dev/null || echo "WARNING: drivers/kernelsu missing!"
          echo "=== Kconfig/Makefile hooks ==="
          grep -r "kernelsu\|KSU" drivers/Makefile drivers/Kconfig 2>/dev/null || echo "WARNING: No KSU hooks in drivers!"
          echo "=== gki_defconfig KSU entries ==="
          grep "CONFIG_KSU" arch/arm64/configs/gki_defconfig || echo "WARNING: No KSU configs in gki_defconfig!"

      - name: Apply SUSFS patches (KSUN only)
        if: matrix.ksu == 'KSUN'
        working-directory: kernel
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu/ -b gki-android12-5.10 sus
          rm -rf sus/.git
          susfs=sus/kernel_patches
          cp -r "$susfs/fs" .
          cp -r "$susfs/include" .
          cp -r "$susfs/50_add_susfs_in_gki-android12-5.10.patch" .
          patch -p1 < 50_add_susfs_in_gki-android12-5.10.patch

      # ── Inject LOCALVERSION ───────────────────────────────────────────────
      - name: Set LOCALVERSION in gki_defconfig
        working-directory: kernel
        run: |
          LOCALVER="-${{ inputs.kernel_name }}-${{ matrix.ksu }}"
          printf '\nCONFIG_LOCALVERSION="%s"\n' "$LOCALVER" \
            >> arch/arm64/configs/gki_defconfig
          echo "LOCALVERSION set to: $LOCALVER"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Run build.sh
        working-directory: kernel
        env:
          CLANG_PATH: ${{ env.CLANG_PATH }}
          CLANG_VARIANT: ${{ matrix.clang }}
        run: |
          cp "$GITHUB_WORKSPACE/build.sh" .
          chmod +x build.sh
          ./build.sh

      # ── Package ───────────────────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          ZIP_NAME="${{ inputs.kernel_name }}-${{ matrix.ksu }}-${{ matrix.clang }}"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/XTENSEI/GrayRavens-anykernel anykernel
          cp kernel/out/arch/arm64/boot/Image anykernel/Image
          cd anykernel
          zip -r9 "../${ZIP_NAME}.zip" . \
            --exclude="*.git*" --exclude="README.md" --exclude="*.placeholder"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ matrix.ksu }}-${{ matrix.clang }}-${{ inputs.kernel_ref }}
          path: kernel/out/arch/arm64/boot/Image
          if-no-files-found: error

      - name: Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip
          if-no-files-found: error
